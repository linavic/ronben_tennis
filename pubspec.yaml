name: ronben_tennis
description: "A professional real-time AI court and out detection system for Tennis and Padel."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # חבילות החומרה, השמע וה-AI הרשמיות של האפליקציה
  camera: ^0.10.5+5
  audioplayers: ^6.0.0
  google_mlkit_object_detection: ^0.7.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true