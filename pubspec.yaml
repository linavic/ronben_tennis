name: ronben_tennis
description: "A professional real-time AI court and out detection system for Tennis and Padel."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # חבילות חומרה, שמע ו-AI מעודכנות למניעת שגיאות קומפילציה
  camera: ^0.12.0+1
  audioplayers: ^6.1.0
  google_mlkit_object_detection: ^0.15.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true